services:
  redis:
    image: redis:7-alpine
    container_name: medical-ocr-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - medical-ocr-network

  medical-ocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-ocr-service
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # PostgreSQL (host nativo via Docker gateway)
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES=${JWT_EXPIRES}
      - JWT_REFRESH_EXPIRES=${JWT_REFRESH_EXPIRES}
      - DEFAULT_PRESTADOR_ID=${DEFAULT_PRESTADOR_ID}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY}
      - TEMP_DIR=${TEMP_DIR}
      - LOG_DIR=${LOG_DIR}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - LOG_LEVEL=${LOG_LEVEL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_URL=redis://redis:6379
      - AUTO_TRAINING_ENABLED=${AUTO_TRAINING_ENABLED}
      - MIN_TRAINING_EXAMPLES=${MIN_TRAINING_EXAMPLES}
      - TRAINING_DIR=${TRAINING_DIR}
      - FINETUNE_EPOCHS=${FINETUNE_EPOCHS}
      - FINETUNE_BATCH_SIZE=${FINETUNE_BATCH_SIZE}
      - FINETUNE_LEARNING_RATE=${FINETUNE_LEARNING_RATE}
      - OPENAI_TIMEOUT_MS=${OPENAI_TIMEOUT_MS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - temp-data:/app/temp
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medical-ocr-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  temp-data:
    driver: local

networks:
  medical-ocr-network:
    driver: bridge
